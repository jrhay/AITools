<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Airtable MCP Helper</title>
<!--
  Airtable MCP Helper v2 — claude.ai artifact (Claude-in-Claude)
  Calls api.anthropic.com/v1/messages with mcp_servers pointing to
  https://mcp.airtable.com/mcp so the inner Claude uses Airtable MCP tools.
  This bypasses the claude.ai MCP session compliance issue with list_records_for_table.

  No token storage needed — the artifact API call is authenticated via
  the claude.ai session automatically (no Authorization header required).

  Base ID and table name are saved to window.storage (artifact persistent storage).
-->
</head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0}
.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{padding:1rem 0;font-family:var(--font-mono,monospace)}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.08em;text-transform:uppercase}
.badge{font-size:11px;padding:2px 8px;border-radius:4px;background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap;margin-bottom:8px}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.field label{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.04em}
.field input,.field select,.field textarea{font-family:var(--font-mono);font-size:13px;width:100%;padding:6px 8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:4px;color:var(--color-text-primary)}
.btn{font-family:var(--font-mono);font-size:12px;padding:6px 12px;border-radius:4px;border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;white-space:nowrap;display:inline-flex;align-items:center;gap:5px}
.btn:hover{background:var(--color-background-secondary)}
.btn:active{transform:scale(0.98)}
.btn.primary{border-color:var(--color-border-primary)}
.btn.danger{color:var(--color-text-danger);border-color:var(--color-border-danger)}
.btn.danger:hover{background:var(--color-background-danger)}
.btn:disabled{opacity:0.35;cursor:default;transform:none}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:0.75rem 0}
.status{font-size:12px;padding:6px 10px;border-radius:4px;margin-bottom:0.75rem;display:flex;align-items:center;gap:8px}
.status.ok{background:var(--color-background-success);color:var(--color-text-success)}
.status.err{background:var(--color-background-danger);color:var(--color-text-danger)}
.status.info{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.status.working{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.spinner{width:12px;height:12px;border:1.5px solid var(--color-border-secondary);border-top-color:var(--color-text-secondary);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{font-family:var(--font-mono);font-size:12px;padding:5px 12px;border-radius:4px;border:0.5px solid transparent;background:transparent;color:var(--color-text-secondary);cursor:pointer}
.tab.active{border-color:var(--color-border-secondary);color:var(--color-text-primary);background:var(--color-background-secondary)}
.tab:hover:not(.active){color:var(--color-text-primary)}
.table-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:4px;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.04em;padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:left;background:var(--color-background-secondary);white-space:nowrap}
td{padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:top;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary);cursor:pointer}
tr.sel td{background:var(--color-background-info);color:var(--color-text-info)}
.kv-grid{display:grid;grid-template-columns:150px 1fr;gap:4px 12px;font-size:12px}
.kv-grid .k{color:var(--color-text-secondary);padding-top:7px;word-break:break-all}
.kv-grid input,.kv-grid select,.kv-grid textarea{font-family:var(--font-mono);font-size:12px;width:100%;padding:5px 8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:4px;color:var(--color-text-primary);margin-bottom:4px}
.kv-grid textarea{resize:vertical;min-height:56px}
.log{font-size:11px;color:var(--color-text-secondary);background:var(--color-background-secondary);border:0.5px solid var(--color-border-tertiary);border-radius:4px;padding:8px;max-height:200px;overflow-y:auto;font-family:var(--font-mono);white-space:pre-wrap;word-break:break-all;margin-bottom:8px}
.empty{padding:1.5rem;text-align:center;color:var(--color-text-secondary);font-size:13px}
</style>
<div class="sr-only" role="heading" aria-level="2">Airtable MCP helper</div>
<div class="wrap" id="app"></div>
<script>
const $=id=>document.getElementById(id);
const mk=(tag,cls,txt)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(txt!=null)e.textContent=txt;return e;};
const el=(tag,attrs={})=>{const e=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>{if(k==='style')Object.assign(e.style,v);else if(k==='class')e.className=v;else e.setAttribute(k,v);});return e;};

const MCP_URL='https://mcp.airtable.com/mcp';
const CLAUDE_API='https://api.anthropic.com/v1/messages';
const MODEL='claude-sonnet-4-6';
const SYS=`You are an Airtable data assistant. Use the Airtable MCP tools to fulfill requests exactly.
When listing records return ONLY a JSON code block:
{"records":[{"id":"recXXX","fields":{...}},...], "offset":"...or null"}
When returning schema return ONLY:
{"tables":[{"id":"tblXXX","name":"...","fields":[{"id":"fldXXX","name":"...","type":"...","options":{}},...]},...]}
When creating/updating/deleting return ONLY:
{"action":"created"|"updated"|"deleted","id":"recXXX"}
No prose. Return only the JSON block.`;

let S={tab:'browse',baseId:'',tableName:'',schema:null,records:[],selectedRec:null,editFields:{},status:null,working:false,log:[],filterField:'',filterVal:''};

async function loadPrefs(){try{const b=await window.storage.get('at_base');if(b)S.baseId=b.value;const t=await window.storage.get('at_table');if(t)S.tableName=t.value;}catch(e){}}
async function savePrefs(){try{await window.storage.set('at_base',S.baseId);await window.storage.set('at_table',S.tableName);}catch(e){}}
function addLog(msg){S.log.push(new Date().toLocaleTimeString()+' '+msg);if(S.log.length>80)S.log.shift();}

async function runAgent(prompt,onDone){
  S.working=true;S.status={type:'working',msg:'Working…'};render();
  addLog('→ '+prompt.substring(0,100));
  const messages=[{role:'user',content:prompt}];
  let result=null;let iters=0;
  while(iters<8){
    iters++;
    let resp;
    try{
      const r=await fetch(CLAUDE_API,{method:'POST',headers:{'Content-Type':'application/json','anthropic-version':'2023-06-01'},body:JSON.stringify({model:MODEL,max_tokens:4000,system:SYS,messages,mcp_servers:[{type:'url',url:MCP_URL,name:'airtable'}]})});
      resp=await r.json();
    }catch(e){S.status={type:'err',msg:'Network: '+e.message};S.working=false;render();return;}
    if(resp.error){S.status={type:'err',msg:resp.error.message||JSON.stringify(resp.error)};S.working=false;render();return;}
    addLog('← stop='+resp.stop_reason+' blocks='+(resp.content?.length||0));
    const texts=(resp.content||[]).filter(b=>b.type==='text');
    const toolUses=(resp.content||[]).filter(b=>b.type==='tool_use');
    if(resp.stop_reason==='end_turn'||resp.stop_reason==='max_tokens'){
      if(texts.length)result=texts[texts.length-1].text;
      break;
    }
    if(resp.stop_reason==='tool_use'&&toolUses.length){
      addLog('tools: '+toolUses.map(t=>t.name).join(', '));
      messages.push({role:'assistant',content:resp.content});
      const tr=toolUses.map(tu=>({type:'tool_result',tool_use_id:tu.id,content:'ok'}));
      messages.push({role:'user',content:tr});
      continue;
    }
    if(texts.length){result=texts[texts.length-1].text;break;}
    break;
  }
  S.working=false;
  if(result)onDone(result);
  else{S.status={type:'err',msg:'No response after '+iters+' iterations'};render();}
}

function parseJSON(text){
  if(!text)return null;
  const m=text.match(/```(?:json)?\s*([\s\S]*?)```/);
  const src=m?m[1]:text;
  try{return JSON.parse(src.trim());}catch(e){return null;}
}

function doFetchSchema(){
  if(!S.baseId){S.status={type:'err',msg:'Enter a base ID first'};render();return;}
  runAgent(`Get the full schema (all tables and their fields with types and options) for Airtable base ${S.baseId}. Return as JSON.`,text=>{
    const j=parseJSON(text);
    if(j?.tables){S.schema=j.tables;if(!S.tableName&&j.tables.length)S.tableName=j.tables[0].name;S.status={type:'ok',msg:'Schema loaded — '+j.tables.length+' table(s)'};savePrefs();}
    else{S.status={type:'err',msg:'Could not parse schema. Got: '+text.substring(0,150)};}
    render();
  });
}

function doFetchRecords(){
  if(!S.baseId||!S.tableName){S.status={type:'err',msg:'Set base ID and table'};render();return;}
  let p=`List records from table "${S.tableName}" in base ${S.baseId}, page size 20`;
  if(S.filterField&&S.filterVal)p+=`, filtered where "${S.filterField}" contains "${S.filterVal}"`;
  p+='. Return as JSON with records array.';
  runAgent(p,text=>{
    const j=parseJSON(text);
    if(j?.records){S.records=j.records;S.status={type:'info',msg:j.records.length+' record(s)'+(j.offset?' — more available':'')};}
    else{S.status={type:'err',msg:'Could not parse records. Got: '+text.substring(0,150)};}
    render();
  });
}

function doCreate(){
  const p=`Create a new record in table "${S.tableName}" in base ${S.baseId} with fields: ${JSON.stringify(S.editFields)}. Return JSON confirmation.`;
  runAgent(p,text=>{
    const j=parseJSON(text);
    if(j?.id||j?.action){S.status={type:'ok',msg:'Created: '+(j.id||'ok')};S.editFields={};doFetchRecords();}
    else{S.status={type:'err',msg:'Create response: '+text.substring(0,150)};render();}
  });
}

function doUpdate(id){
  const p=`Update record ${id} in table "${S.tableName}" in base ${S.baseId} with fields: ${JSON.stringify(S.editFields)}. Return JSON confirmation.`;
  runAgent(p,text=>{
    const j=parseJSON(text);
    if(j?.id||j?.action){S.status={type:'ok',msg:'Updated: '+id};doFetchRecords();}
    else{S.status={type:'err',msg:'Update response: '+text.substring(0,150)};render();}
  });
}

function doDelete(id){
  if(!confirm('Delete '+id+'?'))return;
  runAgent(`Delete record ${id} from table "${S.tableName}" in base ${S.baseId}. Return JSON confirmation.`,text=>{
    S.status={type:'ok',msg:'Deleted: '+id};S.selectedRec=null;doFetchRecords();
  });
}

function fmtCell(val){if(val===null||val===undefined)return'';if(Array.isArray(val))return val.map(v=>typeof v==='object'?(v.name||v.id||JSON.stringify(v)):String(v)).join(', ');if(typeof val==='object')return val.name||val.value||JSON.stringify(val);if(typeof val==='boolean')return val?'✓':'';return String(val);}
function curTbl(){return S.schema?.find(t=>t.name===S.tableName||t.id===S.tableName)||null;}

function renderTopbar(){
  const d=el('div',{class:'topbar'});
  d.append(mk('span','logo','airtable helper'));
  const bg=el('div',{style:{display:'flex',gap:'6px',marginLeft:'auto',alignItems:'center'}});
  if(S.baseId){const b=mk('span','badge');b.textContent=S.baseId.substring(0,10)+'…';bg.append(b);}
  if(S.tableName){const b=mk('span','badge');b.textContent=S.tableName;bg.append(b);}
  if(S.working){const b=mk('span','badge');b.textContent='working…';bg.append(b);}
  d.append(bg);return d;
}

function renderConfig(){
  const d=el('div');const r=el('div',{class:'row'});
  const bf=el('div',{class:'field',style:{flex:'2'}});
  const bi=el('input',{type:'text',placeholder:'appXXXXXXXXXXXXXX',value:S.baseId});
  bi.addEventListener('input',e=>{S.baseId=e.target.value.trim();});
  bf.append(mk('label',null,'base id'),bi);
  const tf=el('div',{class:'field',style:{flex:'2'}});
  let tc;
  if(S.schema&&S.schema.length){
    tc=el('select');
    S.schema.forEach(t=>{const o=el('option',{value:t.name});o.textContent=t.name;if(t.name===S.tableName)o.selected=true;tc.append(o);});
    tc.addEventListener('change',e=>{S.tableName=e.target.value;S.records=[];S.selectedRec=null;savePrefs();});
  }else{
    tc=el('input',{type:'text',placeholder:'table name',value:S.tableName});
    tc.addEventListener('input',e=>{S.tableName=e.target.value;});
  }
  tf.append(mk('label',null,'table'),tc);
  const sb=mk('button','btn primary','load schema');sb.disabled=S.working;sb.addEventListener('click',doFetchSchema);
  r.append(bf,tf,sb);d.append(r);return d;
}

function renderBrowse(){
  const d=el('div');const tbl=curTbl();const cols=tbl?.fields||[];
  const fr=el('div',{class:'row'});
  if(cols.length){
    const fs=el('select',{style:{fontFamily:'var(--font-mono)',fontSize:'12px',padding:'5px 8px',background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-secondary)',borderRadius:'4px',color:'var(--color-text-primary)'}});
    const blank=el('option',{value:''});blank.textContent='filter field…';fs.append(blank);
    cols.forEach(f=>{const o=el('option',{value:f.name});o.textContent=f.name;if(f.name===S.filterField)o.selected=true;fs.append(o);});
    fs.addEventListener('change',e=>{S.filterField=e.target.value;});
    const fv=el('input',{type:'text',placeholder:'contains…',value:S.filterVal,style:{fontFamily:'var(--font-mono)',fontSize:'12px',padding:'5px 8px',background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-secondary)',borderRadius:'4px',color:'var(--color-text-primary)',width:'160px'}});
    fv.addEventListener('input',e=>{S.filterVal=e.target.value;});
    fr.append(fs,fv);
  }
  const fb=mk('button','btn','↺ fetch');fb.disabled=S.working;fb.addEventListener('click',doFetchRecords);fr.append(fb);d.append(fr);
  if(!S.records.length){d.append(mk('div','empty','No records. Set base/table and fetch.'));return d;}
  const dc=cols.length?cols.slice(0,7):Object.keys(S.records[0]?.fields||{}).slice(0,7).map(n=>({name:n}));
  const tw=el('div',{class:'table-wrap'});const t=el('table');
  const thead=el('thead');const hr=el('tr');
  const idth=mk('th');idth.textContent='id';hr.append(idth);
  dc.forEach(f=>{const th=mk('th');th.textContent=f.name;hr.append(th);});
  hr.append(mk('th'));thead.append(hr);t.append(thead);
  const tbody=el('tbody');
  S.records.forEach(rec=>{
    const row=el('tr');if(S.selectedRec?.id===rec.id)row.className='sel';
    const idtd=mk('td');idtd.textContent=rec.id;idtd.style.color='var(--color-text-secondary)';idtd.style.fontSize='11px';row.append(idtd);
    dc.forEach(f=>{const td=el('td');td.textContent=fmtCell(rec.fields[f.name]);row.append(td);});
    const ac=el('td',{style:{whiteSpace:'nowrap'}});
    const eb=mk('button','btn','✎');eb.style.cssText='padding:3px 7px;font-size:11px';eb.addEventListener('click',ev=>{ev.stopPropagation();openEdit(rec);});
    const db=mk('button','btn danger','✕');db.style.cssText='padding:3px 7px;font-size:11px';db.addEventListener('click',ev=>{ev.stopPropagation();doDelete(rec.id);});
    ac.append(eb,db);row.append(ac);row.addEventListener('click',()=>openEdit(rec));tbody.append(row);
  });
  t.append(tbody);tw.append(t);d.append(tw);return d;
}

function openEdit(rec){S.selectedRec=rec;S.tab='edit';S.editFields={};Object.entries(rec.fields).forEach(([k,v])=>{if(typeof v==='object'&&v!==null)S.editFields[k]=JSON.stringify(v);else if(v!==undefined&&v!==null)S.editFields[k]=String(v);});render();}

function renderEditForm(isNew){
  const d=el('div');const tbl=curTbl();const rec=isNew?null:S.selectedRec;
  const skip=['formula','rollup','count','multipleLookupValues','autoNumber','createdTime','lastModifiedTime','createdBy','lastModifiedBy','button'];
  const fields=tbl?tbl.fields.filter(f=>!skip.includes(f.type)):Object.keys(rec?.fields||{}).map(n=>({id:n,name:n,type:'singleLineText'}));
  if(!fields.length){d.append(mk('div','empty','Load schema or fetch records first.'));return d;}
  const grid=el('div',{class:'kv-grid'});
  fields.forEach(f=>{
    const kd=mk('div','k');kd.textContent=f.name;
    const vd=el('div');const cur=S.editFields[f.name]??S.editFields[f.id]??'';
    let inp;
    if(f.type==='multilineText'||f.type==='richText'){inp=el('textarea');inp.value=cur;}
    else if(f.type==='singleSelect'&&f.options?.choices){
      inp=el('select');const blank=el('option',{value:''});blank.textContent='—';inp.append(blank);
      f.options.choices.forEach(c=>{const o=el('option',{value:c.name});o.textContent=c.name;if(c.name===cur)o.selected=true;inp.append(o);});
    }else if(f.type==='checkbox'){
      inp=el('select');[['','—'],['true','✓ checked'],['false','✗ unchecked']].forEach(([v,l])=>{const o=el('option',{value:v});o.textContent=l;if(v===cur)o.selected=true;inp.append(o);});
    }else{inp=el('input',{type:'text',placeholder:f.type||''});inp.value=cur;}
    inp.addEventListener('input',e=>{S.editFields[f.name]=e.target.value;});
    inp.addEventListener('change',e=>{S.editFields[f.name]=e.target.value;});
    vd.append(inp);grid.append(kd,vd);
  });
  d.append(grid);d.append(el('div',{class:'divider'}));
  const br=el('div',{class:'row'});
  if(isNew){const sb=mk('button','btn primary','create record');sb.disabled=S.working;sb.addEventListener('click',doCreate);br.append(sb);}
  else if(rec){
    const ub=mk('button','btn primary','save changes');ub.disabled=S.working;ub.addEventListener('click',()=>doUpdate(rec.id));
    const db=mk('button','btn danger','delete');db.disabled=S.working;db.addEventListener('click',()=>doDelete(rec.id));
    const rid=mk('span');rid.textContent=rec.id;rid.style.cssText='font-size:11px;color:var(--color-text-secondary);margin-left:auto;padding-top:6px';
    br.append(ub,db,rid);
  }
  d.append(br);return d;
}

function renderSchema(){
  const d=el('div');if(!S.schema){d.append(mk('div','empty','Load schema first.'));return d;}
  S.schema.forEach(tbl=>{
    const sec=el('div',{style:{marginBottom:'1rem'}});
    const hd=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}});
    const nm=mk('span');nm.textContent=tbl.name;nm.style.cssText='font-size:13px;font-weight:500';
    const tid=mk('span');tid.textContent=tbl.id;tid.style.cssText='font-size:11px;color:var(--color-text-secondary)';
    const ub=mk('button','btn','use table');ub.style.cssText='padding:3px 10px;font-size:11px;margin-left:auto';
    ub.addEventListener('click',()=>{S.tableName=tbl.name;S.tab='browse';S.records=[];doFetchRecords();});
    hd.append(nm,tid,ub);sec.append(hd);
    const tw=el('div',{class:'table-wrap'});const t=el('table');
    const thead=el('thead');const hr=el('tr');
    ['field','id','type','options'].forEach(h=>{const th=mk('th');th.textContent=h;hr.append(th);});
    thead.append(hr);t.append(thead);
    const tbody=el('tbody');
    tbl.fields.forEach(f=>{
      const row=el('tr');
      [f.name,f.id,f.type,f.options?.choices?.map(c=>c.name).join(', ')||f.options?.linkedTableId||''].forEach((v,i)=>{
        const td=mk('td');td.textContent=v;if(i>0)td.style.color='var(--color-text-secondary)';if(i===1||i===3)td.style.fontSize='11px';row.append(td);
      });tbody.append(row);
    });
    t.append(tbody);tw.append(t);sec.append(tw);d.append(sec);
  });return d;
}

function renderLog(){
  const d=el('div');if(!S.log.length){d.append(mk('div','empty','No activity yet.'));return d;}
  const box=mk('div','log');box.textContent=S.log.join('\n');d.append(box);
  const cb=mk('button','btn','clear log');cb.addEventListener('click',()=>{S.log=[];render();});d.append(cb);return d;
}

function render(){
  const app=$('app');if(!app)return;app.innerHTML='';
  app.append(renderTopbar(),renderConfig(),el('div',{class:'divider'}));
  if(S.status){
    const s=el('div',{class:'status '+S.status.type});
    if(S.status.type==='working'){const sp=el('div',{class:'spinner'});s.append(sp);}
    const t=mk('span');t.textContent=S.status.msg;s.append(t);app.append(s);
  }
  const tabs=el('div',{class:'tabs'});
  [['browse','browse'],['new','new record'],['edit','edit record'],['schema','schema'],['log','log']].forEach(([id,label])=>{
    const t=mk('button','tab'+(S.tab===id?' active':''),label);
    if(id==='edit'&&!S.selectedRec)t.disabled=true;
    t.addEventListener('click',()=>{S.tab=id;if(id==='new')S.editFields={};render();});
    tabs.append(t);
  });
  app.append(tabs);
  if(S.tab==='browse')app.append(renderBrowse());
  else if(S.tab==='new')app.append(renderEditForm(true));
  else if(S.tab==='edit')app.append(renderEditForm(false));
  else if(S.tab==='schema')app.append(renderSchema());
  else if(S.tab==='log')app.append(renderLog());
}
loadPrefs().then(render);
</script>
</body>
</html>
