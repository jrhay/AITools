<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Airtable CRUD Helper</title>
<!--
  Airtable CRUD Helper — claude.ai artifact
  Paste the body contents as an HTML artifact in claude.ai.
  Token is saved to window.storage (artifact persistent storage).
  No data leaves the artifact except to api.airtable.com.
-->
</head>
<body>
<style>
*{box-sizing:border-box;margin:0;padding:0}
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{padding:1rem 0;font-family:var(--font-mono,monospace)}
.topbar{display:flex;align-items:center;gap:10px;margin-bottom:1rem;padding-bottom:0.75rem;border-bottom:0.5px solid var(--color-border-tertiary)}
.logo{font-size:12px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.08em;text-transform:uppercase}
.badge{font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-secondary);border:0.5px solid var(--color-border-tertiary)}
.section{margin-bottom:1rem}
.row{display:flex;gap:8px;align-items:flex-end;flex-wrap:wrap}
.field{display:flex;flex-direction:column;gap:4px;flex:1;min-width:120px}
.field label{font-size:11px;color:var(--color-text-secondary);letter-spacing:0.05em}
.field input,.field select,.field textarea{font-family:var(--font-mono);font-size:13px;width:100%;padding:6px 8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary)}
.field textarea{resize:vertical;min-height:80px}
.btn{font-family:var(--font-mono);font-size:12px;padding:6px 12px;border-radius:var(--border-radius-md);border:0.5px solid var(--color-border-secondary);background:transparent;color:var(--color-text-primary);cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:6px}
.btn:hover{background:var(--color-background-secondary)}
.btn:active{transform:scale(0.98)}
.btn.primary{background:var(--color-background-primary);border-color:var(--color-border-primary)}
.btn.danger{color:var(--color-text-danger);border-color:var(--color-border-danger)}
.btn.danger:hover{background:var(--color-background-danger)}
.btn:disabled{opacity:0.4;cursor:default}
.status{font-size:12px;padding:6px 10px;border-radius:var(--border-radius-md);margin-bottom:0.75rem}
.status.ok{background:var(--color-background-success);color:var(--color-text-success)}
.status.err{background:var(--color-background-danger);color:var(--color-text-danger)}
.status.info{background:var(--color-background-secondary);color:var(--color-text-secondary)}
.table-wrap{overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md)}
table{width:100%;border-collapse:collapse;font-size:12px}
th{font-size:11px;font-weight:500;color:var(--color-text-secondary);letter-spacing:0.05em;padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);text-align:left;background:var(--color-background-secondary);white-space:nowrap}
td{padding:6px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);vertical-align:top;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--color-background-secondary)}
tr.selected td{background:var(--color-background-info);color:var(--color-text-info)}
.tabs{display:flex;gap:4px;margin-bottom:1rem}
.tab{font-family:var(--font-mono);font-size:12px;padding:5px 12px;border-radius:var(--border-radius-md);border:0.5px solid transparent;background:transparent;color:var(--color-text-secondary);cursor:pointer}
.tab.active{border-color:var(--color-border-secondary);color:var(--color-text-primary);background:var(--color-background-secondary)}
.tab:hover:not(.active){color:var(--color-text-primary)}
.divider{height:0.5px;background:var(--color-border-tertiary);margin:0.75rem 0}
.kv-row{display:grid;grid-template-columns:140px 1fr auto;gap:6px;align-items:start;margin-bottom:6px}
.kv-key{font-size:12px;color:var(--color-text-secondary);padding-top:7px}
.kv-val input,.kv-val textarea{font-family:var(--font-mono);font-size:12px;width:100%;padding:5px 8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary)}
.kv-val textarea{resize:vertical;min-height:60px}
.linked{color:var(--color-text-info);font-size:11px}
.pagination{display:flex;align-items:center;gap:8px;margin-top:8px;font-size:12px;color:var(--color-text-secondary)}
.filter-row{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-bottom:8px}
.filter-row input{font-family:var(--font-mono);font-size:12px;padding:5px 8px;background:var(--color-background-secondary);border:0.5px solid var(--color-border-secondary);border-radius:var(--border-radius-md);color:var(--color-text-primary);width:200px}
</style>
<h2 class="sr-only">Airtable CRUD helper</h2>
<div class="wrap" id="app"></div>
<script>
const $=id=>document.getElementById(id);
const el=(tag,attrs={},...kids)=>{const e=document.createElement(tag);Object.entries(attrs).forEach(([k,v])=>k==='style'?Object.assign(e.style,v):k==='class'?e.className=v:e.setAttribute(k,v));kids.forEach(k=>k!=null&&e.append(typeof k==='string'?document.createTextNode(k):k));return e;};
const API='https://api.airtable.com/v0';
let state={token:'',baseId:'',tableId:'',tableName:'',schema:null,records:[],cursor:null,cursors:[],selectedRecord:null,tab:'browse',status:null,loading:false,filterField:'',filterVal:'',editFields:{}};
async function loadToken(){try{const r=await window.storage.get('at_token');if(r)state.token=r.value;}catch(e){}}
async function saveToken(t){try{await window.storage.set('at_token',t);}catch(e){}}
async function api(path,opts={}){if(!state.token)return{error:'No API token set'};const r=await fetch(API+path,{...opts,headers:{'Authorization':'Bearer '+state.token,'Content-Type':'application/json',...(opts.headers||{})}});const j=await r.json();if(!r.ok)return{error:j.error?.message||j.error||'API error '+r.status};return j;}
async function fetchSchema(){if(!state.baseId)return;state.loading=true;render();const j=await api('/meta/bases/'+state.baseId+'/tables');state.loading=false;if(j.error){setStatus(j.error,'err');render();return;}state.schema=j.tables||[];if(!state.tableId&&state.schema.length){state.tableId=state.schema[0].id;state.tableName=state.schema[0].name;}setStatus('Schema loaded — '+state.schema.length+' table(s)','ok');render();}
async function fetchRecords(reset=true){if(!state.baseId||!state.tableId)return;if(reset){state.cursors=[];state.cursor=null;state.records=[];}state.loading=true;render();let url='/'+state.baseId+'/'+state.tableId+'?pageSize=20';if(state.cursor)url+='&offset='+encodeURIComponent(state.cursor);if(state.filterField&&state.filterVal)url+='&filterByFormula=SEARCH("'+state.filterVal.replace(/"/g,'\\"')+'",{'+state.filterField+'})';const j=await api(url);state.loading=false;if(j.error){setStatus(j.error,'err');render();return;}state.records=j.records||[];state.cursor=j.offset||null;setStatus(state.records.length+' record(s)'+(state.cursor?' — more available':''),'info');render();}
async function createRecord(){const fields=buildFields();state.loading=true;render();const j=await api('/'+state.baseId+'/'+state.tableId,{method:'POST',body:JSON.stringify({fields})});state.loading=false;if(j.error){setStatus(j.error,'err');render();return;}setStatus('Created: '+j.id,'ok');state.editFields={};fetchRecords();}
async function updateRecord(id){const fields=buildFields();state.loading=true;render();const j=await api('/'+state.baseId+'/'+state.tableId+'/'+id,{method:'PATCH',body:JSON.stringify({fields})});state.loading=false;if(j.error){setStatus(j.error,'err');render();return;}setStatus('Updated: '+id,'ok');fetchRecords();}
async function deleteRecord(id){if(!confirm('Delete record '+id+'?'))return;state.loading=true;render();const j=await api('/'+state.baseId+'/'+state.tableId+'/'+id,{method:'DELETE'});state.loading=false;if(j.error){setStatus(j.error,'err');render();return;}setStatus('Deleted: '+id,'ok');state.selectedRecord=null;fetchRecords();}
function buildFields(){const tbl=currentTable();const out={};Object.entries(state.editFields).forEach(([fid,val])=>{if(val===''||val===undefined)return;const fld=tbl?.fields.find(f=>f.id===fid);if(!fld)return;if(['number','currency','percent','rating'].includes(fld.type))out[fid]=parseFloat(val)||0;else if(fld.type==='checkbox')out[fid]=val==='true'||val===true;else out[fid]=val;});return out;}
function currentTable(){return state.schema?.find(t=>t.id===state.tableId)||null;}
function setStatus(msg,type='info'){state.status={msg,type};}
function fmtVal(val,fld){if(val===null||val===undefined)return'';if(fld?.type==='multipleRecordLinks'){if(Array.isArray(val))return val.map(v=>el('span',{class:'linked'},v.name||v.id||'?')).reduce((a,b)=>[a,' ',b]);return String(val);}if(Array.isArray(val))return val.map(v=>typeof v==='object'?(v.name||v.id||JSON.stringify(v)):String(v)).join(', ');if(typeof val==='object')return val.name||val.value||JSON.stringify(val);if(typeof val==='boolean')return val?'✓':'';return String(val);}
function renderConfig(){const d=el('div',{class:'section'});const tr=el('div',{class:'row'});const tf=el('div',{class:'field',style:{flex:'1'}});const ti=el('input',{type:'password',placeholder:'patXXX...',value:state.token});ti.addEventListener('input',e=>{state.token=e.target.value;});ti.addEventListener('change',async e=>{await saveToken(e.target.value);setStatus('Token saved','ok');render();});tf.append(el('label',{},'api token'),ti);const cb=el('button',{class:'btn primary'},'load schema');cb.addEventListener('click',fetchSchema);tr.append(tf,cb);d.append(tr);const br=el('div',{class:'row',style:{marginTop:'8px'}});const bf=el('div',{class:'field'});const bi=el('input',{type:'text',placeholder:'appXXXXXXXXXXXXXX',value:state.baseId});bi.addEventListener('input',e=>{state.baseId=e.target.value.trim();});bf.append(el('label',{},'base id'),bi);const taf=el('div',{class:'field'});let tc;if(state.schema&&state.schema.length){tc=el('select');state.schema.forEach(t=>{const o=el('option',{value:t.id},t.name);if(t.id===state.tableId)o.selected=true;tc.append(o);});tc.addEventListener('change',e=>{state.tableId=e.target.value;const t=state.schema.find(x=>x.id===state.tableId);state.tableName=t?.name||'';state.records=[];state.selectedRecord=null;state.editFields={};});}else{tc=el('input',{type:'text',placeholder:'tblXXXXXXXXXXXXXX or name',value:state.tableId});tc.addEventListener('input',e=>{state.tableId=e.target.value.trim();});}taf.append(el('label',{},'table'),tc);br.append(bf,taf);d.append(br);return d;}
function renderBrowse(){const d=el('div');const tbl=currentTable();const cols=tbl?.fields||[];const fr=el('div',{class:'filter-row'});if(cols.length){const fs=el('select',{style:{fontFamily:'var(--font-mono)',fontSize:'12px',padding:'5px 8px',background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',color:'var(--color-text-primary)'}});fs.append(el('option',{value:''},'filter field…'));cols.forEach(f=>{const o=el('option',{value:f.name},f.name);if(f.name===state.filterField)o.selected=true;fs.append(o);});fs.addEventListener('change',e=>{state.filterField=e.target.value;});const fv=el('input',{type:'text',placeholder:'contains…',value:state.filterVal});fv.addEventListener('input',e=>{state.filterVal=e.target.value;});const ab=el('button',{class:'btn'},'filter');ab.addEventListener('click',()=>fetchRecords());const xb=el('button',{class:'btn'},el('i',{class:'ti ti-x','aria-hidden':'true'}));xb.addEventListener('click',()=>{state.filterField='';state.filterVal='';fetchRecords();});fr.append(fs,fv,ab,xb);}const fb=el('button',{class:'btn'});fb.innerHTML='<i class="ti ti-refresh" aria-hidden="true"></i> fetch';fb.disabled=state.loading;fb.addEventListener('click',()=>fetchRecords());fr.append(fb);d.append(fr);if(!state.records.length&&!state.loading){d.append(el('div',{style:{padding:'1.5rem',textAlign:'center',color:'var(--color-text-secondary)',fontSize:'13px'}},'No records. Enter base/table and click fetch.'));return d;}const dc=cols.length?cols.slice(0,8):[];const tw=el('div',{class:'table-wrap'});const t=el('table');const th=el('thead');const hr=el('tr');hr.append(el('th',{},'id'));if(dc.length)dc.forEach(f=>hr.append(el('th',{},f.name)));else hr.append(el('th',{},'fields'));hr.append(el('th',{},''));th.append(hr);t.append(th);const tb=el('tbody');state.records.forEach(rec=>{const row=el('tr');if(state.selectedRecord?.id===rec.id)row.className='selected';row.append(el('td',{style:{color:'var(--color-text-secondary)',fontSize:'11px',whiteSpace:'nowrap'}},rec.id));if(dc.length){dc.forEach(f=>{const v=rec.fields[f.name]??rec.fields[f.id];const cell=el('td');const disp=fmtVal(v,f);if(typeof disp==='string')cell.textContent=disp;else cell.append(disp);row.append(cell);});}else{row.append(el('td',{},JSON.stringify(rec.fields).substring(0,80)));}const ac=el('td',{style:{whiteSpace:'nowrap'}});const eb=el('button',{class:'btn',style:{padding:'3px 8px',fontSize:'11px'}});eb.innerHTML='<i class="ti ti-edit" aria-hidden="true"></i>';eb.addEventListener('click',e=>{e.stopPropagation();openEdit(rec);});const db=el('button',{class:'btn danger',style:{padding:'3px 8px',fontSize:'11px'}});db.innerHTML='<i class="ti ti-trash" aria-hidden="true"></i>';db.addEventListener('click',e=>{e.stopPropagation();deleteRecord(rec.id);});ac.append(eb,db);row.append(ac);row.addEventListener('click',()=>openEdit(rec));tb.append(row);});t.append(tb);tw.append(t);d.append(tw);const pg=el('div',{class:'pagination'});const pv=el('button',{class:'btn'},el('i',{class:'ti ti-arrow-left','aria-hidden':'true'}));pv.disabled=state.cursors.length===0;pv.addEventListener('click',()=>{state.cursors.pop();state.cursor=state.cursors[state.cursors.length-1]||null;fetchRecords(false);});const nx=el('button',{class:'btn'},el('i',{class:'ti ti-arrow-right','aria-hidden':'true'}));nx.disabled=!state.cursor;nx.addEventListener('click',()=>{if(state.cursor){state.cursors.push(state.cursor);fetchRecords(false);}});pg.append(pv,el('span',{},state.records.length+' records'+(state.cursor?' (more)':'')),nx);d.append(pg);return d;}
function openEdit(rec){state.selectedRecord=rec;state.tab='edit';state.editFields={};const tbl=currentTable();if(tbl&&rec){tbl.fields.forEach(f=>{const v=rec.fields[f.name]??rec.fields[f.id];if(v!==undefined&&v!==null){if(typeof v==='object')state.editFields[f.id]=JSON.stringify(v);else state.editFields[f.id]=String(v);}});}render();}
function renderEditForm(isNew=false){const d=el('div');const tbl=currentTable();const rec=isNew?null:state.selectedRecord;const skip=['formula','rollup','count','multipleLookupValues','autoNumber','createdTime','lastModifiedTime','createdBy','lastModifiedBy','button'];if(!tbl){d.append(el('div',{style:{color:'var(--color-text-secondary)',fontSize:'13px'}},'Load schema first.'));const ra=el('textarea',{placeholder:'{"Field Name": "value"}',style:{fontFamily:'var(--font-mono)',fontSize:'12px',width:'100%',padding:'8px',background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',color:'var(--color-text-primary)',minHeight:'120px',marginTop:'8px'}});if(rec)ra.value=JSON.stringify(rec.fields,null,2);ra.addEventListener('input',e=>{try{state.editFields=JSON.parse(e.target.value);}catch(e){}});d.append(ra);}else{tbl.fields.filter(f=>!skip.includes(f.type)).forEach(f=>{const kv=el('div',{class:'kv-row'});const cur=state.editFields[f.id]??'';let inp;if(f.type==='multilineText'||f.type==='richText'){inp=el('textarea',{placeholder:f.type});inp.value=cur;}else if(f.type==='singleSelect'&&f.options?.choices){inp=el('select',{style:{fontFamily:'var(--font-mono)',fontSize:'12px',width:'100%',padding:'5px 8px',background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',color:'var(--color-text-primary)'}});inp.append(el('option',{value:''},'—'));f.options.choices.forEach(c=>{const o=el('option',{value:c.name},c.name);if(c.name===cur)o.selected=true;inp.append(o);});}else if(f.type==='checkbox'){inp=el('select',{style:{fontFamily:'var(--font-mono)',fontSize:'12px',width:'100%',padding:'5px 8px',background:'var(--color-background-secondary)',border:'0.5px solid var(--color-border-secondary)',borderRadius:'var(--border-radius-md)',color:'var(--color-text-primary)'}});[['true','✓ checked'],['false','✗ unchecked']].forEach(([v,l])=>{const o=el('option',{value:v},l);if(v===cur)o.selected=true;inp.append(o);});}else{inp=el('input',{type:'text',placeholder:f.type});inp.value=cur;}inp.addEventListener('change',e=>{state.editFields[f.id]=e.target.value;});inp.addEventListener('input',e=>{state.editFields[f.id]=e.target.value;});const xb=el('button',{class:'btn',style:{padding:'3px 6px',alignSelf:'start',marginTop:'1px'}});xb.innerHTML='<i class="ti ti-x" aria-hidden="true" style="font-size:12px"></i>';xb.addEventListener('click',()=>{delete state.editFields[f.id];inp.value='';if(inp.tagName==='SELECT')inp.selectedIndex=0;});kv.append(el('div',{class:'kv-key'},f.name),el('div',{class:'kv-val'},inp),xb);d.append(kv);});}d.append(el('div',{class:'divider'}));const br=el('div',{class:'row',style:{marginTop:'8px'}});if(isNew){const sb=el('button',{class:'btn primary'},'create record');sb.disabled=state.loading;sb.addEventListener('click',createRecord);br.append(sb);}else if(rec){const ub=el('button',{class:'btn primary'},'save changes');ub.disabled=state.loading;ub.addEventListener('click',()=>updateRecord(rec.id));const db=el('button',{class:'btn danger'},'delete record');db.disabled=state.loading;db.addEventListener('click',()=>deleteRecord(rec.id));br.append(ub,db,el('span',{style:{fontSize:'11px',color:'var(--color-text-secondary)',marginLeft:'auto',paddingTop:'6px'}},rec.id));}d.append(br);return d;}
function renderSchema(){const d=el('div');if(!state.schema){d.append(el('div',{style:{color:'var(--color-text-secondary)',fontSize:'13px'}},'Enter base ID and click "load schema".'));return d;}state.schema.forEach(tbl=>{const s=el('div',{style:{marginBottom:'1rem'}});const hd=el('div',{style:{display:'flex',alignItems:'center',gap:'8px',marginBottom:'6px'}});const ub=el('button',{class:'btn',style:{padding:'3px 10px',fontSize:'11px',marginLeft:'auto'}},'use table');ub.addEventListener('click',()=>{state.tableId=tbl.id;state.tableName=tbl.name;state.tab='browse';fetchRecords();});hd.append(el('span',{style:{fontSize:'13px',fontWeight:'500'}},tbl.name),el('span',{style:{fontSize:'11px',color:'var(--color-text-secondary)'}},tbl.id),ub);s.append(hd);const tw=el('div',{class:'table-wrap'});const t=el('table');const th=el('thead');const hr=el('tr');['field','id','type','options'].forEach(h=>hr.append(el('th',{},h)));th.append(hr);t.append(th);const tb=el('tbody');tbl.fields.forEach(f=>{const row=el('tr');row.append(el('td',{style:{fontWeight:'500'}},f.name),el('td',{style:{color:'var(--color-text-secondary)',fontSize:'11px'}},f.id),el('td',{style:{color:'var(--color-text-secondary)'}},f.type),el('td',{style:{color:'var(--color-text-secondary)',fontSize:'11px'}},f.options?.choices?.map(c=>c.name).join(', ')||f.options?.linkedTableId||''));tb.append(row);});t.append(tb);tw.append(t);s.append(tw);d.append(s);});return d;}
function render(){const app=$('app');app.innerHTML='';const top=el('div',{class:'topbar'});const bgs=el('div',{style:{display:'flex',gap:'6px',marginLeft:'auto',alignItems:'center'}});if(state.token)bgs.append(el('span',{class:'badge'},'token set'));if(state.baseId)bgs.append(el('span',{class:'badge'},state.baseId.substring(0,8)+'…'));if(state.tableName||state.tableId)bgs.append(el('span',{class:'badge'},state.tableName||state.tableId));if(state.loading)bgs.append(el('span',{class:'badge'},'loading…'));top.append(el('span',{class:'logo'},'airtable helper'),bgs);app.append(top,renderConfig(),el('div',{class:'divider'}));if(state.status)app.append(el('div',{class:'status '+state.status.type},state.status.msg));const tabs=el('div',{class:'tabs'});[['browse','browse'],['new','new record'],['edit','edit record'],['schema','schema']].forEach(([id,label])=>{const t=el('button',{class:'tab'+(state.tab===id?' active':'')},label);if(id==='edit'&&!state.selectedRecord)t.disabled=true;t.addEventListener('click',()=>{state.tab=id;if(id==='new')state.editFields={};render();});tabs.append(t);});app.append(tabs);if(state.tab==='browse')app.append(renderBrowse());else if(state.tab==='new')app.append(renderEditForm(true));else if(state.tab==='edit')app.append(renderEditForm(false));else if(state.tab==='schema')app.append(renderSchema());}
loadToken().then(render);
</script>
</body>
</html>
